openapi: 3.0.0
info:
  title: 'Met Office Weather Cloud Function'
  description: 'Reads the current outdoor weather for a fixed latitude/longitude from the Met Office Weather DataHub Site-Specific hourly forecast API and returns it as a single JSON envelope.'
  version: 1.0.0
paths:
  /:
    get:
      summary: 'Get the current weather for the configured location.'
      description: "Returns the current-hour weather for the function's configured location."
      operationId: getCurrentWeather
      responses:
        '200':
          description: 'The current-hour weather for the configured location.'
          headers:
            Access-Control-Allow-Methods:
              description: 'Allowed CORS methods.'
              schema:
                type: string
            Access-Control-Allow-Origin:
              description: 'Configured allowed origin (present when a required origin is configured).'
              schema:
                type: string
            Cache-Control:
              description: 'CDN/browser cache directives (present when cache TTLs are configured).'
              schema:
                type: string
            Surrogate-Control:
              description: 'Surrogate cache directives (present when cache TTLs are configured).'
              schema:
                type: string
            Vary:
              description: 'Vary list (present when a required origin is configured).'
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/SuccessEnvelope' }
                  - { properties: { data: { $ref: '#/components/schemas/WeatherData' } }, type: object }
              example:
                data:
                  valid_from: 1784570400
                  valid_from_iso8601: '2026-07-20T18:00:00+00:00'
                  valid_to: 1784574000
                  valid_to_iso8601: '2026-07-20T19:00:00+00:00'
                  temp: 23.69
                  temp_feels_like: 22.05
                  humidity: 32.39
                  precipitation: 0
                  uv_index: 1
                  visibility: 31474
                  wind_speed: 6.1515748031496
                  wind_gust: 13.600572655691
                  wind_direction: NE
                  wind_direction_degrees: 40
                  type: 1
                  type_name: SUNNY_DAY
                success: true
                timestamp_iso8601: '2026-07-20T18:19:48+00:00'
                timestamp_unix: 1784571588
                version: get-met-office-weather-00028-dig
        '401':
          description: 'The request failed header authorization.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: 'No forecast was available, or an unhandled error occurred.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      servers:
        -
          url: /
components:
  schemas:
    WeatherData:
      description: 'The current-hour weather. The valid-window fields are always present; every other field appears only when its source value is available.'
      required:
        - valid_from
        - valid_from_iso8601
        - valid_to
        - valid_to_iso8601
      properties:
        valid_from:
          description: 'Start of the forecast window (Unix seconds).'
          type: integer
        valid_from_iso8601:
          type: string
          format: date-time
        valid_to:
          description: 'End of the forecast window (Unix seconds).'
          type: integer
        valid_to_iso8601:
          type: string
          format: date-time
        temp:
          description: 'Screen air temperature (degrees Celsius).'
          type: number
        temp_feels_like:
          description: 'Feels-like temperature (degrees Celsius).'
          type: number
        humidity:
          description: 'Screen relative humidity (percent).'
          type: number
        precipitation:
          description: 'Probability of precipitation (percent).'
          type: integer
        uv_index:
          description: 'UV index.'
          type: integer
        visibility:
          description: 'Visibility (metres).'
          type: integer
        wind_speed:
          description: '10m wind speed (mph).'
          type: number
        wind_gust:
          description: 'Maximum 10m wind gust (mph).'
          type: number
        wind_direction:
          description: '10m wind direction as a compass point.'
          type: string
          enum:
            - E
            - ENE
            - ESE
            - 'N'
            - NE
            - NNE
            - NNW
            - NW
            - S
            - SE
            - SSE
            - SSW
            - SW
            - W
            - WNW
            - WSW
        wind_direction_degrees:
          description: '10m wind direction (degrees).'
          type: integer
        type:
          description: 'Met Office significant weather code.'
          type: integer
          enum:
            - 0
            - 7
            - 11
            - 6
            - 21
            - 20
            - 19
            - 15
            - 14
            - 13
            - 27
            - 26
            - 25
            - 12
            - 10
            - 9
            - 24
            - 23
            - 22
            - 5
            - 4
            - 8
            - 3
            - 2
            - 18
            - 17
            - 16
            - 1
            - 30
            - 29
            - 28
            - -1
        type_name:
          description: 'Met Office weather type as a stable enum-name token (e.g. "HEAVY_RAIN"); the consumer maps it to a display name and emoji.'
          type: string
          enum:
            - CLEAR_NIGHT
            - CLOUDY
            - DRIZZLE
            - FOG
            - HAIL
            - HAIL_SHOWER_DAY
            - HAIL_SHOWER_NIGHT
            - HEAVY_RAIN
            - HEAVY_RAIN_SHOWER_DAY
            - HEAVY_RAIN_SHOWER_NIGHT
            - HEAVY_SNOW
            - HEAVY_SNOW_SHOWER_DAY
            - HEAVY_SNOW_SHOWER_NIGHT
            - LIGHT_RAIN
            - LIGHT_RAIN_SHOWER_DAY
            - LIGHT_RAIN_SHOWER_NIGHT
            - LIGHT_SNOW
            - LIGHT_SNOW_SHOWER_DAY
            - LIGHT_SNOW_SHOWER_NIGHT
            - MIST
            - NOT_USED
            - OVERCAST
            - PARTLY_CLOUDY_DAY
            - PARTLY_CLOUDY_NIGHT
            - SLEET
            - SLEET_SHOWER_DAY
            - SLEET_SHOWER_NIGHT
            - SUNNY_DAY
            - THUNDER
            - THUNDER_SHOWER_DAY
            - THUNDER_SHOWER_NIGHT
            - TRACE_RAIN
      type: object
      additionalProperties: false
    ErrorEnvelope:
      description: 'The complete JSON error envelope returned by every consuming function for a failed request (an authorization failure or an unhandled error). Identical for every function.'
      required:
        - success
        - timestamp_unix
        - timestamp_iso8601
        - version
        - error
      properties:
        success:
          description: 'Always false for an error response.'
          type: boolean
          enum:
            - false
        timestamp_unix:
          description: 'When the response was generated (Unix seconds).'
          type: integer
        timestamp_iso8601:
          description: 'When the response was generated (ISO 8601).'
          type: string
          format: date-time
        version:
          description: 'The Cloud Run revision that produced the response.'
          type: string
        error:
          description: 'A human-readable description of what went wrong.'
          type: string
      type: object
      additionalProperties: false
    SuccessEnvelope:
      description: 'The shared base of the JSON success envelope returned by every consuming function. The `data` property is a generic object placeholder; each function tightens it to its own data schema by composing this base with `allOf`, e.g. `allOf: [{$ref: "#/components/schemas/SuccessEnvelope"}, {properties: {data: {$ref: "#/components/schemas/YourData"}}}]`.'
      required:
        - success
        - timestamp_unix
        - timestamp_iso8601
        - version
        - data
      properties:
        success:
          description: 'Always true for a success response.'
          type: boolean
          enum:
            - true
        timestamp_unix:
          description: 'When the response was generated (Unix seconds).'
          type: integer
        timestamp_iso8601:
          description: 'When the response was generated (ISO 8601).'
          type: string
          format: date-time
        version:
          description: 'The Cloud Run revision that produced the response.'
          type: string
        data:
          description: 'The function-specific payload. Each function overrides this via `allOf` with its own data schema.'
          type: object
      type: object
      additionalProperties: false
