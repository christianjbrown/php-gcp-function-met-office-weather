name: Docs

# Publish the OpenAPI spec as a Redoc static site to GitHub Pages.
# The site is built with @redocly/cli (pinned to v1 in package.json) and never
# committed; the _site/ build dir is CI-only.

on:
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'redocly.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Redoc static site
        run: npx redocly build-docs openapi.yaml --output _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
