name: 'Deploy Cloud Function'
on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: 'actions/checkout@v3'
      - id: 'auth'
        uses: 'google-github-actions/auth@v0'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_ID }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'
      - id: 'deploy'
        uses: 'google-github-actions/deploy-cloud-functions@v0'
        with:
          name: '${{ vars.GCP_CLOUD_FUNCTION_ENDPOINT }}'
          entry_point: 'run'
          runtime: 'php82'
          region: 'europe-west2'
          memory_mb: '128'
          env_vars: 'GCP_SECRET_ETSY_REFRESH_TOKEN_PATH=projects/${{ vars.GCP_PROJECT_ID }}/secrets/ETSY_REFRESH_TOKEN'
          build_environment_variables: 'COMPOSER_AUTH={"github-oauth":{"github.com":"${{ secrets.COMPOSER_GITHUB_TOKEN }}"}}'
          secret_environment_variables: 'SITE_ID=projects/${{ vars.GCP_PROJECT_ID }}/secrets/MET_SITE_ID,API_KEY=projects/${{ vars.GCP_PROJECT_ID }}/secrets/MET_API_KEY,REQUIRED_HEADER_KEY=projects/${{ vars.GCP_PROJECT_ID }}/secrets/MET_REQUIRED_HEADER_KEY,REQUIRED_HEADER_VALUE=projects/${{ vars.GCP_PROJECT_ID }}/secrets/MET_REQUIRED_HEADER_VALUE,REQUIRED_ORIGIN=projects/${{ vars.GCP_PROJECT_ID }}/secrets/MET_REQUIRED_ORIGIN'
          https_trigger_security_level: 'secure_always'
          timeout: 60
          deploy_timeout: 600
          min_instances: 0
          max_instances: 3
      - id: 'test'
        run: 'curl "${{ steps.deploy.outputs.url }}"'
